<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Your selected designs from Diamond Jewellers. Send your picks via WhatsApp for pricing and availability.">
    <meta property="og:title" content="Your Selected Designs - Diamond Jewellers">
    <meta property="og:description" content="Your selected jewellery designs from Diamond Jewellers.">
    <meta property="og:image" content="/assets/logo.png">
    <link rel="icon" href="/assets/logo.png" type="image/png">
    <title>Your Cart - Diamond Jewellers</title>
    <!-- Vite Entry -->
    <script type="module" src="/src/main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>
    <div id="header-mount"></div>

    <main>
        <section class="section">
            <div class="container">
                <h2 class="section-title">Your Selected Designs</h2>

                <div class="cart-layout">
                    <div class="cart-items-list">
                        <!-- Items will be populated by JS -->
                    </div>

                    <aside class="order-summary">
                        <h3>Enquire About These Designs</h3>
                        <p style="color: var(--color-text-muted); font-size: 14px; margin-bottom: 20px;">
                            Send your selected designs via WhatsApp and we'll share the latest prices and availability.
                        </p>

                        <div class="cart-buttons">
                            <a href="#" id="whatsapp-checkout" class="btn btn-primary btn-block"
                                style="background: #25D366;">
                                <span class="material-symbols-outlined"
                                    style="vertical-align: middle; margin-right: 5px;">chat</span>
                                Enquire via WhatsApp
                            </a>
                            <a href="collections.html" class="btn btn-secondary btn-block">Browse More Designs</a>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-mount"></div>
</body>

</html>
