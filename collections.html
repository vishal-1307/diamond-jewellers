<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Browse our complete collection of handcrafted rings, necklaces, earrings, bangles and bridal sets from Diamond Jewellers.">
  <meta property="og:title" content="Collections - Diamond Jewellers">
  <meta property="og:description" content="Browse our complete collection of handcrafted jewellery.">
  <meta property="og:image" content="/assets/logo.png">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <title>Collections - Diamond Jewellers</title>
  <!-- Vite Entry -->
  <script type="module" src="/src/main.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>
  <div id="header-mount"></div>

  <main class="shop-page">
    <div class="container page-header">
      <h1 class="section-title">Our Exclusive Collections</h1>
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search jewellery (e.g. Gold Ring)...">
        <select id="sort-select">
          <option value="featured">Featured</option>
          <option value="low-high">Price: Low to High</option>
          <option value="high-low">Price: High to Low</option>
          <option value="rating">Top Rated</option>
          <option value="newest">New Arrivals</option>
        </select>
      </div>
    </div>

    <div class="container shop-layout">
      <!-- Mobile Filter Toggle -->
      <button id="filter-toggle" class="filter-toggle-btn">
        <span class="material-symbols-outlined">tune</span> Filters
      </button>
      <!-- Sidebar -->
      <aside id="filters-sidebar" class="sidebar">
        <!-- Injected via JS -->
      </aside>

      <!-- Product Grid -->
      <section id="products-grid" class="products-grid">
        <!-- Injected via JS -->
      </section>
    </div>
  </main>

  <div id="footer-mount"></div>
</body>

</html>
