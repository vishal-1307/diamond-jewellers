name: Update gold/silver rates

# Refreshes public/rates.json daily and commits if it changed.
# Activate live rates by adding a GOLD_API_URL (and optional GOLD_API_KEY)
# repository secret, then mapping fields in scripts/update-rates.mjs.

on:
  schedule:
    - cron: '30 3 * * *' # 03:30 UTC daily (~09:00 IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Update rates
        env:
          GOLD_API_URL: ${{ secrets.GOLD_API_URL }}
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
        run: node scripts/update-rates.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet public/rates.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/rates.json
            git commit -m "chore: update gold/silver rates"
            git push
          else
            echo "No rate changes."
          fi
